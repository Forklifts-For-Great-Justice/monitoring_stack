auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_limit: 100000

schema_config:
  configs:
    - from: "2020-10-24"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Retention: keep logs for 30 days
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks
  wal:
    dir: /loki/wal
  chunk_retain_period: 1m
  chunk_block_size: 1048576
  max_chunk_retain_period: 3600000000000
  max_chunk_age: 864000000000
  retention_period: 720h
  retention_deletes_enabled: true

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_length: 0
  max_query_series: 5000
  # Per-tenant limits
  max_lines_per_sec: 0
  max_entries_limit: 500000
