version: '3.8'

services:
  loki:
    image: grafana/loki:3.4.3
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - /srv/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    restart: unless-stopped
    networks:
      - monitoring_default
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loki.rule=Host(`logs.hackfortress.net`)"
      - "traefik.http.routers.loki.entrypoints=https"
      - "traefik.http.routers.loki.tls=true"
      - "traefik.http.routers.loki.tls.certresolver=cloudflare"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  promtail:
    image: grafana/promtail:3.4.3
    container_name: promtail
    volumes:
      - /etc/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - promtail-data:/tmp/promtail
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - monitoring_default
    depends_on:
      - loki
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - /srv/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /srv/prometheus/blackbox.yml:/etc/prometheus/blackbox.yml
      - /srv/prometheus/rules:/etc/prometheus/rules
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    restart: unless-stopped
    networks:
      - monitoring_default
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prom.rule=Host(`prom.hackfortress.net`)"
      - "traefik.http.routers.prom.entrypoints=https"
      - "traefik.http.routers.prom.tls=true"
      - "traefik.http.routers.prom.tls.certresolver=cloudflare"
      - "traefik.http.services.prom.loadbalancer.server.port=9090"

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - /var/lib/grafana/dashboards:/var/lib/grafana/dashboards
      - /srv/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - /srv/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring_default
      - proxy
    depends_on:
      - loki
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.hackfortress.net`)"
      - "traefik.http.routers.grafana.entrypoints=https"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.25.0
    ports:
      - "9115:9115"
    volumes:
      - /srv/prometheus/blackbox.yml:/etc/blackbox_exporter/blackbox.yml
    command:
      - --config.file=/etc/blackbox_exporter/blackbox.yml
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://scoreboard:changeme@10.200.0.8:5432/hackfortress?sslmode=disable
    ports:
      - "9187:9187"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus-mcp-server:
    image: ghcr.io/pab1it0/prometheus-mcp-server:1.6.1
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - PROMETHEUS_MCP_SERVER_TRANSPORT=http
      - PROMETHEUS_MCP_BIND_HOST=0.0.0.0
      - PROMETHEUS_MCP_BIND_PORT=8080
      - PROMETHEUS_REQUEST_TIMEOUT=30
    restart: unless-stopped
    networks:
      - monitoring_default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus-mcp.rule=Host(`prometheus-mcp.hackfortress.net`)"
      - "traefik.http.routers.prometheus-mcp.entrypoints=https"
      - "traefik.http.routers.prometheus-mcp.tls=true"
      - "traefik.http.routers.prometheus-mcp.tls.certresolver=cloudflare"
      - "traefik.http.services.prometheus-mcp.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  loki-data:
  prometheus-data:
  grafana-data:
  promtail-data:

networks:
  monitoring_default:
    driver: bridge
    attachable: true
  proxy:
    external: true
