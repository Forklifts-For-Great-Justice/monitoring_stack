version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - /srv/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /srv/prometheus/blackbox.yml:/etc/prometheus/blackbox.yml
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    restart: unless-stopped
    networks:
      - monitoring_default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prom.rule=Host(`prom.hackfortress.net`)"
      - "traefik.http.routers.prom.entrypoints=https"
      - "traefik.http.routers.prom.tls=true"
      - "traefik.http.routers.prom.tls.certresolver=cloudflare"
      - "traefik.http.services.prom.loadbalancer.server.port=9090"

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - /srv/grafana/dashboards:/var/lib/grafana/dashboards
      - /srv/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - /srv/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    restart: unless-stopped
    networks:
      - monitoring_default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.hackfortress.net`)"
      - "traefik.http.routers.grafana.entrypoints=https"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.25.0
    ports:
      - "9115:9115"
    volumes:
      - /srv/prometheus/blackbox.yml:/etc/blackbox_exporter/blackbox.yml
    command:
      - --config.file=/etc/blackbox_exporter/blackbox.yml
    restart: unless-stopped

  prometheus-mcp-server:
    image: ghcr.io/pab1it0/prometheus-mcp-server:1.6.1
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - PROMETHEUS_MCP_SERVER_TRANSPORT=http
      - PROMETHEUS_MCP_BIND_HOST=0.0.0.0
      - PROMETHEUS_MCP_BIND_PORT=8080
      - PROMETHEUS_REQUEST_TIMEOUT=30
    restart: unless-stopped
    networks:
      - monitoring_default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus-mcp.rule=Host(`prometheus-mcp.hackfortress.net`)"
      - "traefik.http.routers.prometheus-mcp.entrypoints=https"
      - "traefik.http.routers.prometheus-mcp.tls=true"
      - "traefik.http.routers.prometheus-mcp.tls.certresolver=cloudflare"
      - "traefik.http.services.prometheus-mcp.loadbalancer.server.port=8080"

volumes:
  prometheus-data:
  grafana-data:

networks:
  monitoring_default:
    driver: bridge
    attachable: true
  proxy:
    external: true
