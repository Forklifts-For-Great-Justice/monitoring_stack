---
version: "3.8"

networks:
  monitoring:
    driver: bridge
  proxy:
    external: true

volumes:
  prometheus-data:
  grafana-data:

services:
  prometheus:
    image: prom/prometheus:v3.2.0
    container_name: monitoring_prometheus
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/blackbox.yml:/etc/prometheus/blackbox.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}"
      - "--storage.tsdb.max-block-duration=2h"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prom.rule=Host(`prom.hackfortress.net`)"
      - "traefik.http.routers.prom.entrypoints=websecure"
      - "traefik.http.routers.prom.tls=true"
      - "traefik.http.routers.prom.tls.certresolver=cloudflare"
      - "traefik.http.services.prom.loadbalancer.server.port=9090"

  grafana:
    image: grafana/grafana:11.5.0
    container_name: monitoring_grafana
    restart: unless-stopped
    networks:
      - monitoring
      - proxy
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_PROMPT_REPORT_DISABLED=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.hackfortress.net`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: monitoring_blackbox_exporter
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - ./prometheus/blackbox.yml:/etc/blackbox_exporter/blackbox.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/blackbox.yml"
    ports:
      - "9115:9115"
